[build]
  publish = "."

# ── NEVER cache index.html — always serve fresh ──────────
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ── NEVER cache service worker — always fresh ────────────
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

# ── NEVER cache manifest ──────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

# ── Cache images for 1 year (they rarely change) ─────────
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirect old filename → index ────────────────────────
[[redirects]]
  from = "/am-womens-boutique.html"
  to = "/"
  status = 301

# ── All routes → index.html (PWA support) ────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
